<!DOCTYPE html>
<html>
<head>
  <title>Send Location</title>
</head>
<body>

<h2>Sending location to Firebase...</h2>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAnyv_1KOcJzoV5vAe8wRZY9ug1x6i4xgw",
  authDomain: "location-f65d7.firebaseapp.com",
  databaseURL: "https://location-f65d7-default-rtdb.firebaseio.com",
  projectId: "location-f65d7",
};

firebase.initializeApp(firebaseConfig);
var database = firebase.database();

function sendLocation(position) {
  var lat = position.coords.latitude;
  var lon = position.coords.longitude;

  database.ref("location").set({
    latitude: lat,
    longitude: lon,
    time: Date.now()
  });

  console.log("Location sent:", lat, lon);
}

navigator.geolocation.watchPosition(sendLocation);
</script>

</body>
</html>
